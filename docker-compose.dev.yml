# ================================================================
#  Development compose — works on any machine, no NVIDIA GPU needed
#  Run via:  start.bat  (Windows)  |  ./start.sh  (Mac/Linux)
# ================================================================

name: smart-attendance

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FACE_ENCRYPTION_KEY: ${FACE_ENCRYPTION_KEY}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.35}
      COOLDOWN_MINUTES: ${COOLDOWN_MINUTES:-5}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["snapshots:/app/snapshots"]

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=2
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [postgres, redis]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=warning
    healthcheck:
      disable: true
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [redis]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
        NEXT_PUBLIC_EDGE_URL: ${NEXT_PUBLIC_EDGE_URL:-}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost}
      NEXT_PUBLIC_EDGE_URL: ${NEXT_PUBLIC_EDGE_URL:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      backend: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["80:80"]
    depends_on: [backend, frontend]

  # ── Edge node (CPU) ───────────────────────────────────────────
  # Provides live MJPEG camera streams and face recognition.
  # Cameras are registered via the dashboard; stream appears automatically.
  edge_node:
    build:
      context: ./edge
      dockerfile: Dockerfile.edge.cpu
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BACKEND_URL: http://backend:8000
      TENANT_ID: ${TENANT_ID:-demo}
      DEVICE: cpu
      EDGE_TOKEN: ${EDGE_TOKEN:-}
      EDGE_USER: ${EDGE_USER:-admin@demo.com}
      EDGE_PASS: ${EDGE_PASS:-admin123}
    ports: ["8001:8001"]
    volumes:
      - ./edge/config:/app/config
      - snapshots:/app/snapshots
      - edge_models:/root/.insightface
      - edge_yolo:/root/.config/Ultralytics
    depends_on:
      backend: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
  snapshots:
  edge_models:
  edge_yolo:
