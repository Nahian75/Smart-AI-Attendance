events { worker_connections 1024; }

http {
  # Allow uploads up to 20 MB (phone photos are typically 3–8 MB)
  client_max_body_size 20M;

  # Docker's embedded DNS — lets nginx start even if upstream hosts aren't up yet
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    server_name localhost;

    # Health check (proxied for start scripts — port 8000 is not published to host)
    location = /health {
      set $backend http://backend:8000;
      proxy_pass $backend;
    }

    # API
    location /api/ {
      set $backend http://backend:8000;
      proxy_pass $backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # WebSocket
    location /ws/ {
      set $backend http://backend:8000;
      proxy_pass $backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # Face snapshots (served by FastAPI StaticFiles — no auth required, LAN only)
    location /snapshots/ {
      set $backend http://backend:8000;
      proxy_pass $backend;
      proxy_cache off;
      add_header Cache-Control "no-cache";
    }

    # Prometheus metrics
    location /metrics {
      set $backend http://backend:8000;
      proxy_pass $backend;
    }

    # Live MJPEG stream — optional, returns 502 when edge node is offline
    location /stream/ {
      set $edge http://edge_node:8001;
      proxy_pass $edge;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_set_header Connection "";
      add_header Cache-Control "no-cache, no-store";
    }

    # Frontend (catch-all)
    location / {
      set $frontend http://frontend:3000;
      proxy_pass $frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
