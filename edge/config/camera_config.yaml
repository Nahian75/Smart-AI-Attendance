tenant_id: demo

# ── Device ───────────────────────────────────────────────────────────────────
device: auto
use_gstreamer: false
yolo_model: yolo11s.pt
tracker: bytetrack.yaml
antispoof_model: edge/weights/antispoof_128.onnx
mask_model: edge/weights/face_mask_detector.onnx

# det_size: SCRFD face-detector input resolution.
# Forced to 640 (not auto 960) because the pipeline crops to the person bbox
# BEFORE face detection — faces arrive as ~450px crops. At det_size 960 these
# crops get upscaled and SCRFD misses the (now blurry) face. Empirically 640
# detects faces in cases where 960 finds nothing, with no downside on full
# frames. Do not raise above 640 unless cameras feed full uncropped frames.
det_size: 640

# ════════════════════════════════════════════════════════════════════════════
#  GLOBAL DEFAULTS
# ════════════════════════════════════════════════════════════════════════════
recognition_threshold: 0.45
liveness_threshold: 0.28
min_det_score: 0.32
mask_det_min: 0.25
enhance_faces: true
superres: false
superres_model: edge/weights/FSRCNN_x2.pb

# Voting: min_votes=2 means a decision fires after just 2 clean frames.
# vote_window=4 is the max buffer before forcing a decision.
# fast_recognize_margin: if a single frame scores (threshold + margin), fire
# immediately without waiting for min_votes. Set 0 to disable.
vote_window: 4
min_votes: 2
fast_recognize_margin: 0.10

fps_target: 0
vote_ttl_seconds: 5
cooldown_seconds: 300

# MediaPipe head-pose limits (degrees). Faces outside these angles are skipped.
mp_max_yaw: 65.0
mp_max_pitch: 50.0

# Mask detection threshold — raised to prevent glasses false positives.
mask_threshold: 0.72

skip_antispoof: false
detect_bags: true

# ════════════════════════════════════════════════════════════════════════════
#  PER-CAMERA PROFILE OVERRIDES
# ════════════════════════════════════════════════════════════════════════════
camera_profiles:

  # ── Dedicated face-check kiosk / entrance gate ───────────────────────────
  # Close-range frontal. Anti-spoof ON. Enhancement OFF (no need at close range).
  # Fastest path: fast_recognize_margin=0.08 fires on 1 frame; min_votes=1 as fallback.
  - match: ["kiosk", "gate", "reception", "checkin", "check-in", "lobby"]
    cctv_mode: false
    skip_antispoof: false
    detect_bags: false
    recognition_threshold: 0.48
    liveness_threshold: 0.42
    min_det_score: 0.45
    enhance_faces: false
    superres: false
    min_votes: 1
    vote_window: 3
    fast_recognize_margin: 0.08

  # ── Hikvision DVR entrance/exit channels ─────────────────────────────────
  # Wall-mounted frontal cameras on 1080P main stream. Anti-spoof ON.
  - match: ["hik", "dvr", "hikvision", "level 1", "entrance"]
    cctv_mode: false
    skip_antispoof: false
    detect_bags: true
    recognition_threshold: 0.45
    liveness_threshold: 0.28
    min_det_score: 0.40
    enhance_faces: true
    superres: false
    min_votes: 2
    vote_window: 4
    fast_recognize_margin: 0.10

  # ── Overhead / staircase / ceiling CCTV cameras ──────────────────────────
  # People look downward — head-pose limits widened so angled faces are not
  # filtered out. Anti-spoof OFF (heuristic gives 100% false positives on DVR).
  # Lower threshold (0.38) compensates for reduced embedding quality at angles.
  - match: ["ceiling", "overhead", "cctv", "staircase", "level 2", "interior", "floor"]
    cctv_mode: true
    skip_antispoof: true
    detect_bags: true
    recognition_threshold: 0.38
    liveness_threshold: 0.25
    min_det_score: 0.32
    enhance_faces: true
    superres: false
    min_votes: 2
    vote_window: 4
    fast_recognize_margin: 0.08
    mp_max_yaw: 75.0
    mp_max_pitch: 70.0

  - match: ["hivideo", "hiv", "v380", "wifi", "ip cam", "ipcam"]
    cctv_mode: false
    skip_antispoof: true          # HiVideo heavy compression causes anti-spoof false positives
    detect_bags: false            # frontal entrance — no bag detection needed
    recognition_threshold: 0.43
    liveness_threshold: 0.35
    min_det_score: 0.32
    enhance_faces: true           # budget sensor benefits from enhancement
    superres: false
    min_votes: 1                  # frontal close-range — single clean frame is enough
    vote_window: 3
    fast_recognize_margin: 0.07   # fire very fast on confident match

  # ── Meeting room cameras ──────────────────────────────────────────────────
  - match: ["meeting", "conference", "boardroom"]
    cctv_mode: true
    skip_antispoof: true
    detect_bags: false
    recognition_threshold: 0.38
    liveness_threshold: 0.32
    min_det_score: 0.22
    enhance_faces: true
    superres: false
    min_votes: 2
    vote_window: 4
    fast_recognize_margin: 0.08
    mp_max_yaw: 75.0
    mp_max_pitch: 70.0

# ════════════════════════════════════════════════════════════════════════════
#  CAMERA SOURCES (fallback if backend API unreachable at startup)
# ════════════════════════════════════════════════════════════════════════════
cameras: []
