# ================================================================
#  Production compose
#  Usage:
#    ./deploy.sh                  (auto-detects IP, CPU edge)
#    ./deploy.sh yourdomain.com   (custom domain)
#  With GPU edge node:
#    docker compose -f docker-compose.prod.yml -f docker-compose.prod.gpu.yml up -d
# ================================================================

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      FACE_ENCRYPTION_KEY: ${FACE_ENCRYPTION_KEY}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.82}
      COOLDOWN_MINUTES: ${COOLDOWN_MINUTES:-5}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
      EDGE_TOKEN: ${EDGE_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["snapshots:/app/snapshots"]

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [postgres, redis]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: celery -A app.workers.celery_app beat --loglevel=warning
    healthcheck:
      disable: true
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [redis]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_EDGE_URL: ${NEXT_PUBLIC_EDGE_URL:-}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      backend: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    restart: always
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["80:80"]
    depends_on: [backend, frontend]

  # CPU edge node — no NVIDIA GPU required
  # For GPU, use:  docker compose -f docker-compose.prod.yml -f docker-compose.prod.gpu.yml up -d
  edge_node:
    build:
      context: ./edge
      dockerfile: Dockerfile.edge.cpu
    restart: always
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BACKEND_URL: http://backend:8000
      TENANT_ID: ${TENANT_ID:-demo}
      DEVICE: cpu
      EDGE_TOKEN: ${EDGE_TOKEN}
    ports: ["8001:8001"]
    volumes:
      - ./edge/config:/app/config
      - snapshots:/app/snapshots
      - edge_models:/root/.insightface
      - edge_yolo:/root/.config/Ultralytics
    depends_on:
      backend: { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
  snapshots:
  edge_models:
  edge_yolo:
