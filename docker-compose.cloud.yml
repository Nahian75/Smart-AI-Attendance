# ================================================================
#  Cloud compose — runs everything EXCEPT the edge node.
#  Deployed on the GCP VM. The edge node runs separately on-prem
#  (see docker-compose.edge.yml / start_edge.bat) and talks to this
#  stack over the network (BACKEND_URL + REDIS_URL + SRT video push).
#
#  Usage on the VM:
#    ./start_cloud.sh
#  Manual:
#    docker compose -f docker-compose.cloud.yml --env-file .env.cloud up -d --build
# ================================================================

name: smart-attendance-cloud

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    # Published so the remote edge node can publish attendance events directly.
    # Lock this down at the GCP firewall level to the edge node's public IP —
    # the password alone is not enough exposed to the open internet.
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      FACE_ENCRYPTION_KEY: ${FACE_ENCRYPTION_KEY}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.35}
      COOLDOWN_MINUTES: ${COOLDOWN_MINUTES:-5}
      EVENT_RETENTION_DAYS: ${EVENT_RETENTION_DAYS:-90}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      EDGE_TOKEN: ${EDGE_TOKEN}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["snapshots:/app/snapshots"]

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [postgres, redis]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=warning
    healthcheck:
      disable: true
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [redis]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_EDGE_URL: ${NEXT_PUBLIC_EDGE_URL:-}
        # MediaMTX HLS output, e.g. http://35.253.8.57:8888 — see infra/mediamtx/mediamtx.cloud.yml
        NEXT_PUBLIC_HLS_URL: ${NEXT_PUBLIC_HLS_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      backend: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["80:80"]
    depends_on: [backend, frontend]

  # ── MediaMTX: SRT ingest for the remote edge node's camera feeds ─────────
  # The edge node (on-prem, behind NAT) pushes each camera as an outbound
  # SRT stream to this server; MediaMTX re-serves it as HLS/WebRTC for the
  # dashboard. See edge/mediamtx.edge.yml for the publishing side.
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      # Overrides pathDefaults.srtPublishPassphrase in mediamtx.cloud.yml
      MTX_PATHDEFAULTS_SRTPUBLISHPASSPHRASE: ${MTX_SRTPUBLISHPASS}
    volumes:
      - ./infra/mediamtx/mediamtx.cloud.yml:/mediamtx.yml:ro
    ports:
      - "8890:8890/udp"  # SRT ingest (edge → cloud)
      - "8888:8888"      # HLS playback (dashboard/browser)
      - "8889:8889"      # WebRTC playback (optional, lower latency)

volumes:
  postgres_data:
  redis_data:
  snapshots:
