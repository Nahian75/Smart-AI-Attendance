services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/alembic/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      FACE_ENCRYPTION_KEY: ${FACE_ENCRYPTION_KEY}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.75}
      COOLDOWN_MINUTES: ${COOLDOWN_MINUTES:-5}
      EDGE_TOKEN: ${EDGE_TOKEN:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    ports: ["8000:8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: ["snapshots:/app/snapshots"]

  celery_worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [postgres, redis]

  celery_beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    healthcheck:
      disable: true
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on: [redis]

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
        NEXT_PUBLIC_EDGE_URL: ${NEXT_PUBLIC_EDGE_URL:-}
    environment:
      # Force Next.js standalone server to bind 0.0.0.0 so the health check
      # can reach it via localhost. Without this Next.js 15 binds to the
      # container's Docker network IP only, making localhost checks fail.
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  edge_node:
    build:
      context: ./edge
      dockerfile: Dockerfile.edge       # GPU build (NVIDIA PyTorch base)
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      BACKEND_URL: http://backend:8000
      TENANT_ID: ${TENANT_ID:-demo}
      DEVICE: ${DEVICE:-cuda}
      EDGE_TOKEN: ${EDGE_TOKEN:-}
      EDGE_USER: ${EDGE_USER:-admin@demo.com}
      EDGE_PASS: ${EDGE_PASS:-admin123}
      YOLO_AUTOINSTALL: "false"
    ports:
      - "8001:8001"
    volumes:
      - ./edge/config:/app/config
      - ./edge/weights:/app/weights
      - ./edge/sdk:/app/sdk          # vendor SDKs: drop .so files here, no rebuild needed
      - snapshots:/app/snapshots
      - edge_models:/root/.insightface
      - edge_yolo:/root/.config/Ultralytics
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    ports: ["8080:80"]
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  snapshots:
  edge_models:
  edge_yolo:
